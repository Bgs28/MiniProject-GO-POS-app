<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="card text-center">
      <div class="card-header">
        <ul class="nav nav-pills card-header-pills">
          <li class="nav-item">
            <a class="nav-link" href="/dashboard-page">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/pos-page">POS</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/product-page">Product</a>
          </li>
          <li class="nav-item ms-auto">
            <button id="btnLogout" class="btn btn-danger me-2">Logout</button>
          </li>
        </ul>
      </div>
    </div>
    <table id="productTable">
      <thead>
        <tr>
          <td>Name</td>
          <td>Price</td>
          <td>Stock</td>
          <td>Action</td>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button class="btn btn-success" onclick="openAddForm()">Add Product</button>

    <!-- simple modal -->
    <div class="modal" tabindex="-1" id="productModal">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h5 id="modalTitle">Add Product</h5>

          <input type="hidden" id="productId" />

          <input
            type="text"
            id="name"
            class="form-control mb-2"
            placeholder="Name"
          />
          <input
            type="number"
            id="price"
            class="form-control mb-2"
            placeholder="Price"
          />
          <input
            type="number"
            id="stock"
            class="form-control mb-2"
            placeholder="Stock"
          />

          <button class="btn btn-success" onclick="saveProduct()">Save</button>
          <button class="btn btn-secondary mt-2" onclick="closeModal()">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </body>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/product.js"></script>
</html>
