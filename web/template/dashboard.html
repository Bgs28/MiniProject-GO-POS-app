<!DOCTYPE html>
<html>
  <head>
    <title>Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <button id="btnLogout">Logout</button>

      <h2>Dashboard</h2>
      <a href="/pos-page">POS</a>

      <div class="row mt-4">
        <div class="col-md-4">
          <div class="card p-3">
            <h5>Total Products</h5>
            <h3 id="products"></h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h5>Total Transactions</h5>
            <h3 id="transactions"></h3>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h5>Today Sales</h5>
            <h3 id="sales"></h3>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
    <script lang="javascript"></script>
  </body>
</html>
