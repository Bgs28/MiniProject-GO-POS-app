<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-4">
      <h2>POS KASIR</h2>
      <div class="row mt-4">
        <div class="col-md-4">
          <h5>Products</h5>
          <table class="table" id="productTable">
            <thead>
              <tr>
                <td>Product</td>
                <td>Price</td>
                <td>Stock</td>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="col-md-6">
          <h5>Cart</h5>
          <table class="table" id="cartTable">
            <thead>
              <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <h4>Total: <span id="total">0</span></h4>
          <button class="btn btn-succes" onclick="checkout()">Checkout</button>
        </div>
      </div>
    </div>
    <script src="/static/js/pos.js"></script>
  </body>
</html>
